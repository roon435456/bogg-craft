<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bog OS — Cooking G4M3S</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bog-green: #4caf50;
      --bog-green-dark: #2d6e30;
      --bog-green-glow: #00ff44;
      --orange: #ff7900;
      --orange-dark: #cc5500;
      --swamp-dark: #0a1a0a;
      --swamp-mid: #122012;
      --taskbar-bg: rgba(8, 18, 8, 0.97);
      --window-bg: rgba(10, 22, 10, 0.95);
      --window-border: #4caf50;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'VT323', monospace;
    }

    /* ── DESKTOP ── */
    #desktop {
      width: 100vw;
      height: 100vh;
      background-color: #0a1a0a;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Swamp overlay for atmosphere */
    #desktop::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 110%, rgba(0,60,10,0.45) 0%, transparent 70%),
                  radial-gradient(ellipse at 20% 80%, rgba(0,80,20,0.25) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── ICON GRID ── */
    #icon-grid {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      padding: 28px 20px 70px 20px;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    /* ── APP ICON ── */
    .app-icon {
      width: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-decoration: none;
      border-radius: 8px;
      padding: 8px 4px 6px;
      transition: transform 0.12s ease, filter 0.12s ease;
      animation: iconFadeIn 0.5s ease both;
    }

    .app-icon:hover {
      transform: scale(1.08) translateY(-4px);
      filter: drop-shadow(0 0 10px var(--bog-green-glow));
      background: rgba(76,175,80,0.1);
    }

    .app-icon:active {
      transform: scale(0.97) translateY(0px);
    }

    .app-icon img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .icon-label {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--bog-green);
      text-shadow:
        -1px -1px 0 var(--orange),
         1px -1px 0 var(--orange),
        -1px  1px 0 var(--orange),
         1px  1px 0 var(--orange),
         0 0 8px rgba(76, 175, 80, 0.7);
      text-align: center;
      line-height: 1.2;
      max-width: 95px;
      word-break: break-word;
      pointer-events: none;
    }

    @keyframes iconFadeIn {
      from { opacity: 0; transform: translateY(12px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }

    /* ── TASKBAR ── */
    #taskbar {
      width: 100%;
      height: 54px;
      background: var(--taskbar-bg);
      border-top: 2px solid var(--bog-green-dark);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      position: relative;
      z-index: 100;
      flex-shrink: 0;
      box-shadow: 0 -2px 18px rgba(0,200,60,0.18);
    }

    /* ── START BUTTON AREA ── */
    #start-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px 4px 6px;
      border: 2px solid var(--bog-green-dark);
      border-radius: 6px;
      background: rgba(20, 50, 20, 0.8);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }

    #start-btn:hover {
      background: rgba(40, 90, 40, 0.9);
      border-color: var(--bog-green);
    }

    #start-btn img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    #start-btn span {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--bog-green);
      text-shadow:
        -1px -1px 0 var(--orange),
         1px -1px 0 var(--orange),
        -1px  1px 0 var(--orange),
         1px  1px 0 var(--orange);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ── TASKBAR DIVIDER ── */
    .taskbar-divider {
      width: 2px;
      height: 36px;
      background: var(--bog-green-dark);
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* ── TASKBAR TABS ── */
    #taskbar-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #taskbar-tabs::-webkit-scrollbar { display: none; }

    .taskbar-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border: 1px solid var(--bog-green-dark);
      border-radius: 5px;
      background: rgba(20, 55, 20, 0.75);
      cursor: pointer;
      color: var(--bog-green);
      font-family: 'VT323', monospace;
      font-size: 15px;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s;
      text-shadow: 0 0 6px rgba(76,175,80,0.5);
    }

    .taskbar-tab:hover {
      background: rgba(40, 90, 40, 0.9);
      border-color: var(--bog-green);
    }

    .taskbar-tab.active {
      background: rgba(60, 130, 60, 0.85);
      border-color: var(--bog-green-glow);
    }

    .taskbar-tab img {
      width: 18px;
      height: 18px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    /* ── CLOCK ── */
    #clock {
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: var(--bog-green);
      text-shadow: 0 0 8px rgba(76,175,80,0.6);
      padding: 0 8px;
      flex-shrink: 0;
      letter-spacing: 1px;
    }

    /* ── SCANLINE OVERLAY ── */
    #scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── RIGHT-CLICK CONTEXT MENU ── */
    #context-menu {
      display: none;
      position: fixed;
      background: var(--window-bg);
      border: 1px solid var(--bog-green-dark);
      border-radius: 6px;
      padding: 4px 0;
      z-index: 5000;
      min-width: 160px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    #context-menu.visible { display: block; }

    .ctx-item {
      padding: 8px 16px;
      font-family: 'VT323', monospace;
      font-size: 15px;
      color: var(--bog-green);
      cursor: pointer;
      transition: background 0.1s;
    }

    .ctx-item:hover {
      background: rgba(76, 175, 80, 0.2);
      color: var(--bog-green-glow);
    }
  </style>
</head>
<body>

<div id="scanlines"></div>

<div id="desktop">

  <!-- ════════ ICON GRID ════════ -->
  <div id="icon-grid">

    <a class="app-icon" href="base.html" title="Open App">
      <img src="label.png" alt="App Icon" />
      <span class="icon-label">Cooking G4M3</span>
    </a>

  </div>

  <!-- ════════ TASKBAR ════════ -->
  <div id="taskbar">

    <!-- Start Button -->
    <div id="start-btn" title="Bog OS">
      <img src="Bog-Monster.png" alt="Bog Monster" />
      <span>BOG OS</span>
    </div>

    <div class="taskbar-divider"></div>

    <!-- Open Tabs -->
    <div id="taskbar-tabs">
      <div class="taskbar-tab active">
        <img src="label.png" alt="" onerror="this.style.display='none'" />

      </div>
    </div>

    <div class="taskbar-divider"></div>

    <!-- Clock -->
    <div id="clock">00:00</div>

  </div>
</div>

<!-- Context Menu -->
<div id="context-menu">
  <div class="ctx-item" onclick="location.reload()">🔄 Refresh Desktop</div>
  <div class="ctx-item" onclick="bogAlert('Bog OS v1.0\nBy the Swamp')">ℹ️ About Bog OS</div>
  <div class="ctx-item" onclick="document.getElementById('context-menu').classList.remove('visible')">✖ Close</div>
</div>

<script>
  // Clock — updates every second
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Background — works with local files by fetching as blob
  fetch('CC.png')
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      document.getElementById('desktop').style.backgroundImage = 'url(' + url + ')';
    })
    .catch(() => {/* CC.png not found, fallback color stays */});

  // Right-click context menu
  const ctxMenu = document.getElementById('context-menu');
  document.addEventListener('contextmenu', e => {
    e.preventDefault();
    ctxMenu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
    ctxMenu.style.top  = Math.min(e.clientY, window.innerHeight - 120) + 'px';
    ctxMenu.classList.add('visible');
  });
  document.addEventListener('click', () => ctxMenu.classList.remove('visible'));

  // Bog alert
  function bogAlert(msg) {
    // Simple styled modal
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(0,0,0,0.7);
      display:flex;align-items:center;justify-content:center;z-index:9000;
    `;
    const box = document.createElement('div');
    box.style.cssText = `
      background:#0a1a0a;border:2px solid #4caf50;border-radius:10px;
      padding:32px 40px;font-family:'VT323',monospace;color:#4caf50;
      font-size:20px;text-align:center;max-width:340px;
      text-shadow:0 0 8px rgba(76,175,80,0.5);
      box-shadow:0 0 30px rgba(76,175,80,0.25);
    `;
    box.innerHTML = msg.replace(/\n/g,'<br>') +
      `<br><br><button onclick="this.closest('[style]').remove()" style="
        margin-top:8px;padding:8px 28px;background:#1a3d1a;
        border:1px solid #4caf50;border-radius:5px;color:#4caf50;
        font-family:'VT323',monospace;font-size:18px;cursor:pointer;
      ">OK</button>`;
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  }

  // Icon stagger delay
  document.querySelectorAll('.app-icon').forEach((el, i) => {
    el.style.animationDelay = (i * 0.07) + 's';
  });
</script>

</body>
</html>
